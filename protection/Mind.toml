# Mind.toml — protection manifest for xrm_mind_port
# Copyright 2026 STARGA, Inc. STARGA Commercial License.
#
# Consumed by mindc when building the MIND port binary. Enables the
# full [protection] transform set so that STARGA's MIND runtime and
# the sealed XRM blob are both locked inside the final ELF.

[package]
name = "xrm_mind_port"
version = "0.1.0"
edition = "2026"

[build]
entry = "examples/xrm_mind_port.mind"
opt_level = 3
target = "l4-cuda"

# ---- Protection transforms (compiler-side) --------------------------
# These correspond to the four transforms applied by mindc to every
# [protection] module. All four are mandatory for locked builds.

[protection.transforms]
obfuscate_strings = true      # String literal encryption at rest
anti_debug        = true      # ptrace / IsDebuggerPresent / PT_DENY_ATTACH
anti_tamper       = true      # Binary integrity check at entry
vm_protection     = true      # Critical paths lowered to VM bytecode

# ---- Runtime protections (linked from MIND runtime) -----------------
# Present in the compiled ELF; all of these are always on for
# [protection] modules. Listed here for visibility; not user-tunable.

[protection.runtime]
ptrace_guard            = true
debug_register_guard    = true
timing_anomaly_guard    = true
integrity_self_check    = true
watchdog_loop           = true
triple_redundant_state  = true
encrypted_string_table  = true
indirect_jump_table     = true
cflow_flattening        = true
dead_code_insertion     = true
opaque_predicate        = true
constant_encryption     = true
symbol_obfuscation      = true
stack_guard             = true

# ---- Linker / strip phase -------------------------------------------

[protection.linker]
version_script   = "protection/exports.map"
strip_source     = true       # Remove embedded .mind source blocks
strip_symbols    = true       # Drop symbol table
strip_comment    = true       # .comment section cleared (no toolchain fingerprint)
gc_sections      = true
no_export_except_version_script = true

# ---- Sealed-blob policy ---------------------------------------------

[protection.seal]
mode            = "sha256_compile_time"
include_file    = "test-harness/seal_hashes.inc"
refuse_on_mismatch = true
